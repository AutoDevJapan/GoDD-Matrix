name: Deploy

# 4 環境デプロイ (issue #8):
#   preview : PR ごとにプレビュー環境へ
#   dev     : main への push で本番 (dev live) へ
#   stg     : 手動 dispatch (target=stg)
#   prd     : 手動 dispatch (target=prd)。GitHub Environment `production` の
#             承認ゲート付き。今回は「定義のみ」で実行しない。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: デプロイ先環境 (stg / prd)
        type: choice
        options: [stg, prd]
        required: true

# 同一ブランチ・同一イベントの旧実行はキャンセルするが、本番反映は取りこぼさない
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Vercel CLI はこれらを環境変数として自動参照する (--token は付けない)
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_CLI: vercel@54.21.1

jobs:
  # ── preview: PR ごと ───────────────────────────────────────────────
  preview:
    name: preview (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Vercel pull (preview)
        run: npx --yes ${VERCEL_CLI} pull --yes --environment=preview
      - name: Vercel build
        run: npx --yes ${VERCEL_CLI} build
      - name: Vercel deploy (preview)
        id: deploy
        run: |
          url="$(npx --yes ${VERCEL_CLI} deploy --prebuilt)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview: $url"

  # ── dev: main push → 本番 (dev live) ──────────────────────────────
  dev:
    name: dev (main push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Vercel pull (production)
        run: npx --yes ${VERCEL_CLI} pull --yes --environment=production
      - name: Vercel build (prod)
        run: npx --yes ${VERCEL_CLI} build --prod
      - name: Vercel deploy (prod)
        id: deploy
        run: |
          url="$(npx --yes ${VERCEL_CLI} deploy --prebuilt --prod)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "dev live: $url"

  # ── stg: 手動 dispatch (target=stg) ───────────────────────────────
  stg:
    name: stg (dispatch)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'stg'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Vercel pull (production)
        run: npx --yes ${VERCEL_CLI} pull --yes --environment=production
      - name: Vercel build (prod)
        run: npx --yes ${VERCEL_CLI} build --prod
      - name: Vercel deploy (prod)
        id: deploy
        run: |
          url="$(npx --yes ${VERCEL_CLI} deploy --prebuilt --prod)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "stg: $url"

  # ── prd: 手動 dispatch (target=prd) + 承認ゲート。定義のみ ─────────
  prd:
    name: prd (dispatch, approval)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prd'
    runs-on: ubuntu-latest
    # GitHub Environment `production` に required reviewers を設定し承認ゲートとする
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Vercel pull (production)
        run: npx --yes ${VERCEL_CLI} pull --yes --environment=production
      - name: Vercel build (prod)
        run: npx --yes ${VERCEL_CLI} build --prod
      - name: Vercel deploy (prod)
        id: deploy
        run: |
          url="$(npx --yes ${VERCEL_CLI} deploy --prebuilt --prod)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "prd: $url"
