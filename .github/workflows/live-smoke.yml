name: Live Smoke

# デプロイ済み /mcp の実疎通スモーク (issue #22)。
# 本番キーが要るため通常 CI では非実行。手動 dispatch のみ。
# 既定 URL は本番 live。secrets.GODD_MCP_API_KEY があれば認証も検証する。
on:
  workflow_dispatch:
    inputs:
      mcp_url:
        description: 対象 MCP エンドポイント URL
        type: string
        required: false
        default: https://godd-matrix.vercel.app/mcp

# 認証キーはリポジトリ secrets から (未設定なら認証なしで疎通のみ)
permissions:
  contents: read

jobs:
  live-smoke:
    name: live スモーク (opt-in)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GODD_MATRIX_MCP_URL を渡すと live-smoke.test.ts が有効化される。
      - name: Run live smoke test
        env:
          GODD_MATRIX_MCP_URL: ${{ github.event.inputs.mcp_url }}
          GODD_MCP_API_KEY: ${{ secrets.GODD_MCP_API_KEY }}
        run: pnpm test live-smoke
