name: Pages

# GoDD Matrix 検索&コピペ Web ページ (issue #28) を GitHub Pages へ公開する。
# 完全クライアントサイドの静的成果物 (web/dist) を配信する。サーバ/秘密なし。
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "scripts/build-web.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# GitHub Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は 1 つに。進行中のデプロイはキャンセルしない (公開の取りこぼし防止)。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 静的ビルド (web/dist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web)
        run: pnpm typecheck:web

      - name: Build static site
        run: pnpm build:web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Pages へデプロイ
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
