name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの旧ワークフローはキャンセルして無駄な実行を避ける
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: 品質ゲート (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # package.json の packageManager (pnpm@x) からバージョンを解決する
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Typecheck web
        run: pnpm typecheck:web

      - name: Typecheck browser tests
        run: pnpm typecheck:e2e

      - name: Test (vitest)
        run: pnpm test

      - name: Build (tsc)
        run: pnpm build

      - name: Build static web
        run: pnpm build:web

      # Chromium 1種・1 worker の小さな built-site suite に限定して実行時間を抑える。
      - name: Install Chromium for browser tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser regression tests
        run: pnpm test:e2e

  gitleaks:
    name: シークレット走査 (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # git 履歴全体を走査するため全コミットを取得する
          fetch-depth: 0

      # gitleaks-action v2 は Organization で有償ライセンスを要求するため、
      # ライセンス不要な CLI バイナリを直接取得して実行する。
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --retry 3 --retry-all-errors \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          printf '%s  %s\n' "${GITLEAKS_LINUX_X64_SHA256}" "${archive}" \
            | sha256sum --check --strict
          tar -xzf "${archive}" gitleaks
          ./gitleaks version
          ./gitleaks detect --source . --redact --verbose --exit-code 1
