name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの旧ワークフローはキャンセルして無駄な実行を避ける
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: 品質ゲート (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # package.json の packageManager (pnpm@x) からバージョンを解決する
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Typecheck web
        run: pnpm typecheck:web

      - name: Test (vitest)
        run: pnpm test

      - name: Build (tsc)
        run: pnpm build

      - name: Build static web
        run: pnpm build:web

  gitleaks:
    name: シークレット走査 (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git 履歴全体を走査するため全コミットを取得する
          fetch-depth: 0

      # gitleaks-action v2 は Organization で有償ライセンスを要求するため、
      # ライセンス不要な CLI バイナリを直接取得して実行する。
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
          ./gitleaks detect --source . --redact --verbose --exit-code 1
